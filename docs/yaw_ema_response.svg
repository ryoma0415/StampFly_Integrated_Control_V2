<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img">
<title>EMAローパスフィルタ(α=0.18, 10Hz)の周波数応答とステップ応答</title>
<desc>左パネルは指数移動平均フィルタのゲイン周波数応答で、カットオフ約0.32Hz、一次-6dB/octの減衰、ナイキスト5Hzで-20dB。右パネルはステップ応答で、63%到達が約0.4秒、90%が約1.1秒、95%が約1.5秒、平均遅れ約456ms。</desc>
<defs>
<style>
text{font-family:-apple-system,'Helvetica Neue','Hiragino Sans','Arial',sans-serif}
.tt{font-size:19px;font-weight:500;fill:#2C2C2A}
.pt{font-size:15px;font-weight:500;fill:#0C447C}
.ax{font-size:12px;font-weight:400;fill:#5F5E5A}
.axb{font-size:13px;font-weight:500;fill:#2C2C2A}
.cap{font-size:13px;font-weight:400;fill:#2C2C2A}
.curve{fill:none;stroke:#185FA5;stroke-width:2.4}
.grid{stroke:#E4E2DA;stroke-width:1}
.pbox{fill:none;stroke:#B4B2A9;stroke-width:1}
.lvl{stroke:#A32D2D;stroke-width:1.2;stroke-dasharray:5 3}
.ref{stroke:#888780;stroke-width:1.1;stroke-dasharray:5 3}
</style>
</defs>

<rect x="0" y="0" width="1200" height="560" fill="#ffffff"/>
<text class="tt" x="50" y="38">EMA ローパスフィルタ（α = 0.18・実効 10 Hz, Δt = 100 ms）の特性</text>

<text class="pt" x="100" y="72">① 周波数応答 — ゲイン [dB]</text>
<line class="grid" x1="100" y1="100" x2="560" y2="100"/>
<line class="grid" x1="100" y1="180" x2="560" y2="180"/>
<line class="grid" x1="100" y1="260" x2="560" y2="260"/>
<line class="grid" x1="100" y1="340" x2="560" y2="340"/>
<line class="grid" x1="100" y1="420" x2="560" y2="420"/>
<line class="grid" x1="270" y1="100" x2="270" y2="420"/>
<line class="grid" x1="441" y1="100" x2="441" y2="420"/>
<rect class="pbox" x="100" y="100" width="460" height="320"/>
<text class="ax" x="92" y="104" text-anchor="end">0</text>
<text class="ax" x="92" y="184" text-anchor="end">−6</text>
<text class="ax" x="92" y="264" text-anchor="end">−12</text>
<text class="ax" x="92" y="344" text-anchor="end">−18</text>
<text class="ax" x="92" y="424" text-anchor="end">−24</text>
<text class="ax" x="100" y="438" text-anchor="middle">0.01</text>
<text class="ax" x="270" y="438" text-anchor="middle">0.1</text>
<text class="ax" x="441" y="438" text-anchor="middle">1</text>
<text class="ax" x="560" y="438" text-anchor="middle">5</text>
<text class="axb" x="330" y="462" text-anchor="middle">周波数 [Hz]（対数）</text>

<line class="lvl" x1="100" y1="140" x2="356" y2="140"/>
<line class="lvl" x1="356" y1="140" x2="356" y2="420"/>
<circle cx="356" cy="140" r="4" fill="#A32D2D"/>
<text class="ax" x="366" y="130" fill="#A32D2D">−3 dB @ 0.32 Hz（カットオフ）</text>
<polyline class="curve" points="100,100 151,100 219,101 270,105 322,119 356,140 390,172 441,237 492,308 522,344 560,368"/>

<text class="pt" x="690" y="72">② ステップ応答 — 正規化出力</text>
<line class="grid" x1="690" y1="100" x2="1150" y2="100"/>
<line class="grid" x1="690" y1="180" x2="1150" y2="180"/>
<line class="grid" x1="690" y1="260" x2="1150" y2="260"/>
<line class="grid" x1="690" y1="340" x2="1150" y2="340"/>
<line class="grid" x1="690" y1="420" x2="1150" y2="420"/>
<line class="grid" x1="805" y1="100" x2="805" y2="420"/>
<line class="grid" x1="920" y1="100" x2="920" y2="420"/>
<line class="grid" x1="1035" y1="100" x2="1035" y2="420"/>
<rect class="pbox" x="690" y="100" width="460" height="320"/>
<text class="ax" x="682" y="104" text-anchor="end">1.0</text>
<text class="ax" x="682" y="184" text-anchor="end">0.75</text>
<text class="ax" x="682" y="264" text-anchor="end">0.5</text>
<text class="ax" x="682" y="344" text-anchor="end">0.25</text>
<text class="ax" x="682" y="424" text-anchor="end">0</text>
<text class="ax" x="690" y="438" text-anchor="middle">0</text>
<text class="ax" x="805" y="438" text-anchor="middle">500</text>
<text class="ax" x="920" y="438" text-anchor="middle">1000</text>
<text class="ax" x="1035" y="438" text-anchor="middle">1500</text>
<text class="ax" x="1150" y="438" text-anchor="middle">2000</text>
<text class="axb" x="920" y="462" text-anchor="middle">時間 [ms]</text>
<text class="ax" x="1150" y="94" text-anchor="end">入力ステップ = 1.0（漸近線）</text>

<line class="lvl" x1="690" y1="219" x2="782" y2="219"/>
<line class="lvl" x1="782" y1="219" x2="782" y2="420"/>
<circle cx="782" cy="219" r="4" fill="#A32D2D"/>
<text class="ax" x="792" y="214" fill="#A32D2D">63% ≈ 0.4 s</text>
<line class="lvl" x1="690" y1="132" x2="943" y2="132"/>
<line class="lvl" x1="943" y1="132" x2="943" y2="420"/>
<circle cx="943" cy="132" r="4" fill="#A32D2D"/>
<text class="ax" x="953" y="127" fill="#A32D2D">90% ≈ 1.1 s</text>
<polyline class="curve" points="690,362 713,315 736,276 759,244 782,219 805,197 851,165 920,136 966,124 1035,113 1150,105"/>

<text class="cap" x="100" y="492">カットオフ ~0.32 Hz。遅い方位・ドリフトは素通し、</text>
<text class="cap" x="100" y="510">速い変動は一次 −6 dB/oct で減衰（ナイキスト 5 Hz で −20 dB）。</text>
<text class="cap" x="690" y="492">63% ≈ 0.4 s / 90% ≈ 1.1 s / 95% ≈ 1.5 s で追従。</text>
<text class="cap" x="690" y="510">平均遅れ（群遅延）~456 ms。速い動きはジャイロ担当なので許容。</text>

<text class="cap" x="600" y="544" text-anchor="middle" fill="#5F5E5A">α を上げれば追従は速いがノイズが残り、下げればノイズは減るが遅れが増える。0.18 はノイズ除去寄りの中間点。</text>
</svg>
