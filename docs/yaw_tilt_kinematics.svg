<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img">
<title>チルト運動学ヨーレートの幾何</title>
<desc>水平時は機体z軸と地球down軸が一致しヨージャイロがそのままψ̇になるが、傾斜時は機体z軸が地球down軸からロールφだけ傾くため、ヨー成分がcosφに縮み、÷cosφで方位変化率ψ̇に戻す必要があることを示す幾何図。</desc>
<defs>
<marker id="arwB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arwG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text{font-family:-apple-system,'Helvetica Neue','Hiragino Sans','Arial',sans-serif}
.tt{font-size:19px;font-weight:500;fill:#2C2C2A}
.pt{font-size:15px;font-weight:500;fill:#0C447C}
.nt{font-size:12px;font-weight:400;fill:#888780}
.lb{font-size:13px;font-weight:500}
.ax{font-size:12px;font-weight:400;fill:#5F5E5A}
.cap{font-size:13px;font-weight:400;fill:#2C2C2A}
</style>
</defs>

<rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>
<text class="tt" x="50" y="38">傾きが方位変化率 ψ̇ をどう歪めるか — チルト運動学の幾何（front 軸から見たロール面）</text>

<text class="pt" x="70" y="82">① 水平時（tilt = 0）</text>
<line x1="300" y1="169" x2="300" y2="393" stroke="#185FA5" stroke-width="2.4" marker-end="url(#arwB)"/>
<rect x="240" y="148" width="120" height="14" rx="4" fill="#B5D4F4" stroke="#185FA5"/>
<circle cx="300" cy="155" r="4" fill="#185FA5"/>
<path d="M258 138 Q300 116 342 138" fill="none" stroke="#185FA5" stroke-width="1.8" marker-end="url(#arwB)"/>
<text class="lb" x="300" y="106" fill="#0C447C" text-anchor="middle">ψ̇ = ω_z</text>
<text class="ax" x="300" y="414" text-anchor="middle">機体 z 軸 = 地球 down 軸 Ẑ_E</text>
<text class="ax" x="300" y="432" text-anchor="middle">（水平なので一致）</text>
<text class="cap" x="70" y="470">・両軸が一致 → ヨージャイロ ω_z がそのまま ψ̇。</text>

<line x1="600" y1="70" x2="600" y2="486" stroke="#E4E2DA" stroke-width="1"/>

<text class="pt" x="650" y="82">② 傾斜時（ロール φ）</text>
<line x1="775" y1="187" x2="865" y2="124" stroke="#B5D4F4" stroke-width="12" stroke-linecap="round"/>
<line x1="820" y1="169" x2="820" y2="393" stroke="#888780" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arwG)"/>
<line x1="820" y1="155" x2="952" y2="343" stroke="#185FA5" stroke-width="2.4" marker-end="url(#arwB)"/>
<circle cx="820" cy="155" r="4" fill="#185FA5"/>
<path d="M820 201 Q835 199 846 193" fill="none" stroke="#5F5E5A" stroke-width="1.4"/>
<text class="lb" x="856" y="210" fill="#5F5E5A">φ</text>
<path d="M778 138 Q820 116 862 138" fill="none" stroke="#185FA5" stroke-width="1.8" marker-end="url(#arwB)"/>
<text class="lb" x="820" y="106" fill="#0C447C" text-anchor="middle">ψ̇</text>
<path d="M958 318 Q986 330 970 353" fill="none" stroke="#185FA5" stroke-width="1.8" marker-end="url(#arwB)"/>
<text class="lb" x="992" y="336" fill="#0C447C">ω_z</text>
<text class="ax" x="806" y="412" text-anchor="end">Ẑ_E</text>
<text class="ax" x="966" y="356">機体 z 軸 b_z</text>

<line x1="952" y1="343" x2="812" y2="343" stroke="#A32D2D" stroke-width="1.3" stroke-dasharray="5 3"/>
<rect x="814" y="337" width="7" height="6" fill="none" stroke="#A32D2D" stroke-width="1"/>
<line x1="806" y1="169" x2="806" y2="343" stroke="#A32D2D" stroke-width="1.2"/>
<line x1="802" y1="169" x2="810" y2="169" stroke="#A32D2D" stroke-width="1.2"/>
<line x1="802" y1="343" x2="810" y2="343" stroke="#A32D2D" stroke-width="1.2"/>
<text class="ax" x="738" y="260" fill="#791F1F">cosφ に</text>
<text class="ax" x="738" y="278" fill="#791F1F">縮む</text>
<text class="cap" x="650" y="470">・b_z が Ẑ_E から φ 傾く → ヨー成分が cosφ に縮む → ÷cosφ で ψ̇ に戻す（φ=90° でロック）。</text>

<rect x="150" y="500" width="900" height="184" rx="10" fill="#F7F6F2" stroke="#D3D1C7"/>
<text x="600" y="548" text-anchor="middle" font-size="22" font-weight="500" fill="#0C447C">ψ̇ = [ (ω_z − b_g)·cosθ − p·sinθ ] / cosφ</text>
<text class="cap" x="600" y="588" text-anchor="middle">分子 = 地球鉛直まわりの回転成分を ピッチθ・ロールレートp で組み直す（水平なら = ω_z − b_g）</text>
<text class="cap" x="600" y="616" text-anchor="middle">分母 ÷cosφ = ロール傾きの“縮み”を戻すゲイン。φ→90°（ロール±90°）で発散＝ジンバルロック</text>
<text class="cap" x="600" y="644" text-anchor="middle">→ フォールバック ψ̇ = ω_z − b_g。極限確認: 水平で ψ̇ = ω_z − b_g、ロール90° でフォールバック</text>
<text class="nt" x="600" y="670" text-anchor="middle">※ ピッチθ・ロールレートp の寄与は面外のため分子で加わる（本図はロール面のみ図示）</text>
</svg>
