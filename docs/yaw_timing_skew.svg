<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img">
<title>磁気と電流の非同期サンプリングによる最大50msの時刻ズレ</title>
<desc>10Hzの磁気センサと20Hzの電流センサを50msごとに読み取ると、磁気サンプルの変換完了から読み取りまで最大50ms待機し、updateでペアにする磁場の時刻と電流の時刻が最大50msずれることを示すタイミング図。</desc>
<defs>
<marker id="arwB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arwR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text{font-family:-apple-system,'Helvetica Neue','Hiragino Sans','Arial',sans-serif}
.tt{font-size:19px;font-weight:500;fill:#2C2C2A}
.th{font-size:14px;font-weight:500}
.ts{font-size:13px;font-weight:400}
.leg{font-size:13px;font-weight:400;fill:#444441}
.grid{stroke:#B4B2A9;stroke-width:1;stroke-dasharray:4 4}
</style>
</defs>

<rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>
<text class="tt" x="40" y="42">磁気 ~10Hz と電流 ~20Hz は非同期 — ペアに最大 ~50ms の時刻ズレ</text>

<rect x="40" y="62" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A"/>
<text class="leg" x="60" y="73">MCU poll (50ms毎)</text>
<rect x="250" y="62" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5"/>
<text class="leg" x="270" y="73">磁気: 変換 / 読取 ~10Hz</text>
<rect x="530" y="62" width="14" height="14" rx="3" fill="#F0997B" stroke="#993C1D"/>
<text class="leg" x="550" y="73">電流 ~20Hz</text>
<rect x="710" y="62" width="14" height="14" rx="3" fill="#F09595" stroke="#A32D2D"/>
<text class="leg" x="730" y="73">時刻ズレ ~50ms</text>

<line class="grid" x1="200" y1="130" x2="200" y2="560"/>
<line class="grid" x1="400" y1="130" x2="400" y2="560"/>
<line class="grid" x1="600" y1="130" x2="600" y2="560"/>
<line class="grid" x1="800" y1="130" x2="800" y2="560"/>
<line class="grid" x1="1000" y1="130" x2="1000" y2="560"/>

<text class="th" x="40" y="166" fill="#2C2C2A">MCU poll</text>
<text class="ts" x="40" y="184" fill="#5F5E5A">20Hz · 50ms</text>
<line x1="190" y1="170" x2="1010" y2="170" stroke="#888780" stroke-width="1"/>
<circle cx="200" cy="170" r="6" fill="#888780"/>
<circle cx="400" cy="170" r="6" fill="#888780"/>
<circle cx="600" cy="170" r="6" fill="#888780"/>
<circle cx="800" cy="170" r="6" fill="#888780"/>
<circle cx="1000" cy="170" r="6" fill="#888780"/>

<text class="th" x="40" y="296" fill="#0C447C">BMM150 磁気</text>
<text class="ts" x="40" y="314" fill="#185FA5">~10Hz</text>
<line x1="190" y1="300" x2="1010" y2="300" stroke="#85B7EB" stroke-width="1"/>
<line x1="408" y1="300" x2="408" y2="260" stroke="#185FA5" stroke-width="2"/>
<circle cx="408" cy="257" r="5" fill="#185FA5"/>
<text class="ts" x="408" y="248" fill="#0C447C" text-anchor="middle">変換完了</text>
<line x1="808" y1="300" x2="808" y2="260" stroke="#185FA5" stroke-width="2"/>
<circle cx="808" cy="257" r="5" fill="#185FA5"/>
<text class="ts" x="808" y="248" fill="#0C447C" text-anchor="middle">変換完了</text>
<line x1="414" y1="282" x2="594" y2="282" stroke="#185FA5" stroke-width="1.4" marker-end="url(#arwB)"/>
<text class="ts" x="504" y="275" fill="#185FA5" text-anchor="middle">未読で待機 ≈48ms</text>
<circle cx="200" cy="300" r="5" fill="#ffffff" stroke="#185FA5" stroke-width="1.4"/>
<circle cx="400" cy="300" r="5" fill="#ffffff" stroke="#185FA5" stroke-width="1.4"/>
<circle cx="800" cy="300" r="5" fill="#ffffff" stroke="#185FA5" stroke-width="1.4"/>
<text class="ts" x="400" y="322" fill="#5F5E5A" text-anchor="middle">非新規</text>
<text class="ts" x="800" y="322" fill="#5F5E5A" text-anchor="middle">非新規</text>
<circle cx="600" cy="300" r="8" fill="#185FA5"/>
<circle cx="1000" cy="300" r="8" fill="#185FA5"/>
<text class="ts" x="600" y="324" fill="#0C447C" text-anchor="middle">新規 ✓ → EKF update</text>
<text class="ts" x="1000" y="324" fill="#0C447C" text-anchor="middle">新規 ✓</text>

<line x1="408" y1="300" x2="408" y2="392" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="600" y1="446" x2="600" y2="392" stroke="#A32D2D" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="410" y1="392" x2="598" y2="392" stroke="#A32D2D" stroke-width="1.8" marker-start="url(#arwR)" marker-end="url(#arwR)"/>
<text class="th" x="504" y="414" fill="#791F1F" text-anchor="middle">時刻ズレ ≈48ms（最大 ~50ms）</text>

<text class="th" x="40" y="466" fill="#4A1B0C">INA3221 電流</text>
<text class="ts" x="40" y="484" fill="#993C1D">~20Hz</text>
<line x1="190" y1="470" x2="1010" y2="470" stroke="#F0997B" stroke-width="1"/>
<rect x="182" y="446" width="18" height="24" fill="#F0997B" stroke="#993C1D" stroke-width="0.8"/>
<rect x="382" y="446" width="18" height="24" fill="#F0997B" stroke="#993C1D" stroke-width="0.8"/>
<rect x="582" y="446" width="18" height="24" fill="#F0997B" stroke="#993C1D" stroke-width="0.8"/>
<rect x="782" y="446" width="18" height="24" fill="#F0997B" stroke="#993C1D" stroke-width="0.8"/>
<rect x="982" y="446" width="18" height="24" fill="#F0997B" stroke="#993C1D" stroke-width="0.8"/>
<text class="ts" x="700" y="494" fill="#993C1D" text-anchor="middle">各 poll = 直近 ~4.5ms 平均（ほぼ最新）</text>

<line x1="190" y1="540" x2="1010" y2="540" stroke="#888780" stroke-width="1"/>
<line x1="200" y1="540" x2="200" y2="546" stroke="#888780"/>
<line x1="400" y1="540" x2="400" y2="546" stroke="#888780"/>
<line x1="600" y1="540" x2="600" y2="546" stroke="#888780"/>
<line x1="800" y1="540" x2="800" y2="546" stroke="#888780"/>
<line x1="1000" y1="540" x2="1000" y2="546" stroke="#888780"/>
<text class="ts" x="200" y="562" fill="#5F5E5A" text-anchor="middle">0</text>
<text class="ts" x="400" y="562" fill="#5F5E5A" text-anchor="middle">50</text>
<text class="ts" x="600" y="562" fill="#5F5E5A" text-anchor="middle">100</text>
<text class="ts" x="800" y="562" fill="#5F5E5A" text-anchor="middle">150</text>
<text class="ts" x="1000" y="562" fill="#5F5E5A" text-anchor="middle">200</text>
<text class="ts" x="1035" y="562" fill="#5F5E5A">ms</text>

<rect x="190" y="596" width="820" height="86" rx="8" fill="#F7F6F2" stroke="#D3D1C7"/>
<text class="ts" x="206" y="620" fill="#2C2C2A">・約10Hz の磁気と約20Hz の電流は非同期。50ms ごとに読み、data_ready のときだけ update（実効 ~10Hz）。</text>
<text class="ts" x="206" y="644" fill="#2C2C2A">・変換完了が poll 直後だと読取は次の poll ＝ 最大 ~50ms 待機。その間に電流は先へ進む。</text>
<text class="ts" x="206" y="668" fill="#2C2C2A">・update のペア「磁場の時刻」と「電流の時刻」の差 ≤ ~50ms ＝ τ_resid。σ_slew = |a_xy|·|dI/dt|·τ_resid が吸収。</text>
</svg>
