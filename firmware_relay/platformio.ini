; ===========================================================================
; StampFly Integrated Control — リレーファームウェア
; ボード: ESP32-WROOM-32E DevKitC (esp32dev) / フレームワーク: Arduino
; 仕様: ../docs/PROTOCOL.md, ../docs/ARCHITECTURE.md
;
; 注意: CORE_DEBUG_LEVEL=0 は release/debug 両方で必須。
; データUART(UART0)への生テキスト出力を構造的に禁止しているため
; (テキストは LOG_TEXT フレームのみ)、コアログを有効にしてはならない。
; ===========================================================================
[platformio]
default_envs = release

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_unflags = -Os
build_flags =
    -I../protocol
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=0

[env:release]
build_flags =
    ${env.build_flags}
    -O2

[env:debug]
build_type = debug
build_flags =
    ${env.build_flags}
    -Og
    -g3
