; ============================================================================
; StampFly Integrated Control — 機体ファーム (ESP32-S3)
;
; - プロトコル実装は ../protocol/stampfly_protocol.hpp を共有 (-I../protocol)
; - protocolヘッダ(C++17)のため -std=gnu++17 を強制
; - lib_deps 注意: 契約上は Beirdo/INA3221 だがレジストリに存在しないため、
;   飛行実績のある sensor.cpp が依存する tinyu-zhao/INA3221 を使用する
;   (OptiTrack版 platformio.ini と同一)。OneButton はボタンモジュール
;   なしのため不要。
; ============================================================================

[platformio]
default_envs = release

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_unflags = -std=gnu++11
lib_deps =
    fastled/FastLED @ ^3.10.1
    tinyu-zhao/INA3221 @ ^0.0.1

[env:release]
build_type = release
build_flags =
    -I../protocol
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=0
    -O2

[env:debug]
build_type = debug
build_flags =
    -I../protocol
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -Og
    -g3
